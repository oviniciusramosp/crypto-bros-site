<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>Crypto Bros</title>
    <meta name="description" content="Feed do Crypto Bros — mercado, estudos e trade cripto." />
    <!-- Link previews (Open Graph + Twitter) -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="Crypto Bros" />
    <meta property="og:title" content="Crypto Bros" />
    <meta property="og:description" content="Feed do Crypto Bros — mercado, estudos e trade cripto." />
    <meta property="og:url" content="https://crypto-bros.com/" />
    <meta property="og:image" content="https://crypto-bros.com/og.png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:locale" content="pt_BR" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Crypto Bros" />
    <meta name="twitter:description" content="Feed do Crypto Bros — mercado, estudos e trade cripto." />
    <meta name="twitter:image" content="https://crypto-bros.com/og.png" />
    <link rel="icon" type="image/png" href="./favicon.png?v=14" />
    <link rel="apple-touch-icon" href="./apple-touch-icon.png" />
    <link rel="manifest" href="./manifest.webmanifest" />
    <meta name="theme-color" content="#000000" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <!-- Native App Store smart banner (iOS Safari) -->
    <meta name="apple-itunes-app" content="app-id=6758371729, app-argument=https://crypto-bros.com/" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="./styles.css?v=14" />
    <script>
      (function () {
        try {
          var m = localStorage.getItem('cb-theme');
          if (m !== 'light' && m !== 'dark') {
            m = window.matchMedia && window.matchMedia('(prefers-color-scheme: light)').matches ? 'light' : 'dark';
          }
          document.documentElement.setAttribute('data-theme', m);
        } catch (e) {}
      })();
    </script>
  </head>
  <body>
    <!-- Apple-style locale suggestion banner (shown when the visitor's country
         speaks a different language than the one currently selected) -->
    <div id="lang-banner" class="lang-banner hidden">
      <span id="lang-banner-text" class="lang-banner__text"></span>
      <button id="lang-banner-switch" class="lang-banner__btn"></button>
      <button id="lang-banner-close" class="lang-banner__close" aria-label="Fechar">✕</button>
    </div>

    <!-- Login -->
    <section id="login" class="login hidden">
      <img class="login__logo" src="./icon.png" alt="Crypto Bros" />
      <h1 class="login__title">Crypto Bros</h1>
      <p class="login__subtitle" id="login-subtitle"></p>
      <div class="g-wrap">
        <div class="g-fake" aria-hidden="true">
          <svg viewBox="0 0 48 48" width="18" height="18"><path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/><path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/><path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/><path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.15 1.45-4.92 2.3-8.16 2.3-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/></svg>
          <span id="g-fake-label">Continuar com o Google</span>
        </div>
        <div id="google-btn" class="g-real"></div>
      </div>
      <p class="login__hint" id="login-hint"></p>
      <p id="login-error" class="login__error hidden"></p>
      <div class="menu__seg login__lang" id="login-lang">
        <button data-lang="pt">Português BR</button>
        <button data-lang="en">Inglês</button>
      </div>
    </section>

    <!-- Feed -->
    <main id="app" class="hidden">
      <div id="ios-banner" class="ios-banner hidden">
        <img src="./icon.png" alt="" class="ios-banner__icon" />
        <div class="ios-banner__text"><strong>Crypto Bros</strong><span id="ios-banner-sub"></span></div>
        <a id="ios-banner-cta" class="ios-banner__cta" href="#" target="_blank" rel="noopener"></a>
        <button id="ios-banner-close" class="ios-banner__close" aria-label="Fechar">✕</button>
      </div>
      <header class="topbar">
        <span class="topbar__brand"><img src="./icon.png" alt="" /><span id="brand-title">Crypto Bros</span></span>
        <!-- Feed | Estudos. Reuses .menu__seg so it matches the app's SegmentedControl. -->
        <nav id="viewbar" class="menu__seg viewbar">
          <button data-view="feed" id="viewbar-feed"></button>
          <button data-view="lessons" id="viewbar-lessons"></button>
        </nav>
        <div class="user">
          <button id="user-btn" class="user-btn" aria-label="Menu" aria-haspopup="true"></button>
          <div id="user-menu" class="menu hidden" role="menu">
            <div class="menu__user">
              <div class="menu__user-avatar" id="menu-avatar"></div>
              <div class="menu__user-info">
                <div class="menu__user-name" id="menu-name"></div>
                <div class="menu__user-email" id="menu-email"></div>
              </div>
            </div>
            <div class="menu__section">
              <div class="menu__label" id="menu-lang-label">Idioma</div>
              <div class="menu__seg" id="menu-lang">
                <button data-lang="pt">Português BR</button>
                <button data-lang="en">Inglês</button>
              </div>
            </div>
            <div class="menu__section">
              <div class="menu__label" id="menu-theme-label">Aparência</div>
              <div class="menu__seg" id="menu-theme">
                <button data-theme-pref="system"></button>
                <button data-theme-pref="light"></button>
                <button data-theme-pref="dark"></button>
              </div>
            </div>
            <button class="menu__notif" id="menu-notif"></button>
            <button class="menu__logout" id="menu-logout"></button>
          </div>
        </div>
      </header>

      <div class="feed">
        <div id="view-feed">
          <section id="marquee" class="marquee">
            <div class="marquee__viewport"><div class="marquee__track" id="marquee-track"></div></div>
          </section>
          <section id="market" class="market"></section>
          <nav id="tagbar" class="tagbar"></nav>
          <div id="feed-list" class="feed-list"></div>
          <section id="history" class="history hidden"></section>
        </div>

        <div id="view-lessons" class="hidden">
          <div id="lessons-list"></div>
        </div>
      </div>
    </main>

    <!-- Post detail modal -->
    <div id="modal" class="modal hidden" role="dialog" aria-modal="true">
      <div class="modal__backdrop" id="modal-backdrop"></div>
      <div class="modal__panel">
        <button class="modal__close" id="modal-close" aria-label="Fechar">✕</button>
        <div class="modal__actions">
          <!-- Lessons only: mark completed. Sits beside share, not instead of it. -->
          <button class="modal__action modal__complete hidden" id="modal-complete">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><path d="M20 6L9 17l-5-5"/></svg>
          </button>
          <button class="modal__action modal__share" id="modal-share" aria-label="Compartilhar">
            <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="18" cy="5" r="3"/><circle cx="6" cy="12" r="3"/><circle cx="18" cy="19" r="3"/><path d="M8.6 13.5l6.8 4M15.4 6.5l-6.8 4"/></svg>
          </button>
        </div>
        <div class="modal__scroll" id="modal-content"></div>
      </div>
    </div>

    <!-- Fullscreen image viewer -->
    <div id="lightbox" class="lightbox hidden">
      <button id="lightbox-close" class="lightbox__close" aria-label="Fechar">✕</button>
      <img id="lightbox-img" src="" alt="" />
    </div>

    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <script src="./i18n.js?v=14" defer></script>
    <script src="./app.js?v=14" defer></script>
  </body>
</html>
