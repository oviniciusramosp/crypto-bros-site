<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>Crypto Bros</title>
    <meta name="description" content="Feed do Crypto Bros — mercado, estudos e trade cripto." />
    <link rel="icon" type="image/png" href="./favicon.png" />
    <link rel="apple-touch-icon" href="./icon.png" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="./styles.css" />
    <script>
      (function () {
        try {
          var m = localStorage.getItem('cb-theme');
          if (m !== 'light' && m !== 'dark') {
            m = window.matchMedia && window.matchMedia('(prefers-color-scheme: light)').matches ? 'light' : 'dark';
          }
          document.documentElement.setAttribute('data-theme', m);
        } catch (e) {}
      })();
    </script>
  </head>
  <body>
    <!-- Login -->
    <section id="login" class="login hidden">
      <img class="login__logo" src="./icon.png" alt="Crypto Bros" />
      <h1 class="login__title">Crypto Bros</h1>
      <p class="login__subtitle" id="login-subtitle"></p>
      <div id="google-btn"></div>
      <p class="login__hint" id="login-hint"></p>
      <p id="login-error" class="login__error hidden"></p>
    </section>

    <!-- Feed -->
    <main id="app" class="hidden">
      <header class="topbar">
        <span class="topbar__brand"><img src="./icon.png" alt="" /><span id="brand-title">Feed</span></span>
        <div class="lang-toggle" id="lang-toggle">
          <button data-lang="pt">PT</button>
          <button data-lang="en">EN</button>
        </div>
        <button id="theme-btn" class="icon-btn" title="Tema" aria-label="Tema">◐</button>
        <button id="signout-btn" class="icon-btn" title="Sair" aria-label="Sair">⏻</button>
      </header>

      <div class="feed">
        <section id="marquee" class="marquee">
          <div class="marquee__viewport"><div class="marquee__track" id="marquee-track"></div></div>
        </section>
        <section id="market" class="market"></section>
        <nav id="tagbar" class="tagbar"></nav>
        <div id="feed-list" class="feed-list"></div>
      </div>
    </main>

    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <script src="./i18n.js" defer></script>
    <script src="./app.js" defer></script>
  </body>
</html>
