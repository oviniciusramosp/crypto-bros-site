name: Deploy site

# Publishes this repo (crypto-bros.com static site) to GitHub Pages.
on:
  push:
    branches: [main]
  workflow_dispatch:
  # Regenerates the per-post share pages so newly published posts get link previews.
  # ponytail: dumb cron. Event-driven (Worker pings workflow_dispatch on a new post) would
  # avoid the idle rebuilds — do that if the Actions noise starts to matter.
  schedule:
    - cron: '*/30 * * * *'

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Generate per-post share pages (/p/<id>)
        env:
          SHARE_KEY: ${{ secrets.SHARE_KEY }}
        run: node scripts/gen-share.mjs
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: .
      - id: deploy
        uses: actions/deploy-pages@v4
